name: Publish container

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./vosk_tts
          file: ./vosk_tts/Dockerfile
          push: true
          tags: |
            ghcr.io/asharinlexa-source/ha-vosk-tts:latest
            ghcr.io/asharinlexa-source/ha-vosk-tts:1.0.1
