name: "Vosk TTS"
slug: "vosk_tts"
version: "1.1.0"
description: "Local Wyoming-based Vosk TTS for Home Assistant with streaming"
startup: services
boot: auto
init: false
host_network: true
arch:
  - amd64

map:
  - type: homeassistant_config
    read_only: false
    path: /config

options:
  model_path: "/config/addons/data/vosk_tts/data/vosk-model-tts-ru-0.10-multi"
  uri: "tcp://0.0.0.0:10205"
  speech_rate: 1.0
  use_accentizer: false

schema:
  model_path: str
  uri: str
  speech_rate: float
  use_accentizer: bool
